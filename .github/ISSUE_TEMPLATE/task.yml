name: ⚙️ Technical Task
description: Implementation task (not user-facing)
title: "[TASK] "
labels: ["task", "needs-triage"]
body:
  - type: input
    id: parent_story
    attributes:
      label: Parent Story
      placeholder: "#45"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be built/refactored?
    validations:
      required: true

  - type: dropdown
    id: task_type
    attributes:
      label: Task Type
      options:
        - API Integration
        - Database Schema
        - Frontend Component
        - Testing
        - DevOps/CI/CD
        - Documentation
        - Refactoring
    validations:
      required: true

  - type: input
    id: estimated_hours
    attributes:
      label: Estimated Hours
      placeholder: "4"
    validations:
      required: false

  - type: textarea
    id: code_references
    attributes:
      label: Related Code/Files
      description: Link to specific files or PRs
      placeholder: |
        - `src/lib/jira-client.ts`
        - PR #67 (OAuth implementation)
    validations:
      required: false
