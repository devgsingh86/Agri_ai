name: 📖 User Story
description: Feature requirement from user perspective
title: "[STORY] "
labels: ["story", "needs-triage"]
body:
  - type: input
    id: story_id
    attributes:
      label: Story ID
      placeholder: S-001
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: User Story
      description: As a [role], I want [feature], so that [benefit]
      placeholder: "As a product manager, I want to see Initiative rollups, so that I can track product roadmap"
    validations:
      required: true

  - type: input
    id: parent_epic
    attributes:
      label: Parent Epic
      description: Link to parent epic (use #issue_number)
      placeholder: "#23"
    validations:
      required: true

  - type: dropdown
    id: story_points
    attributes:
      label: Story Points
      options:
        - "1"
        - "2"
        - "3"
        - "5"
        - "8"
        - "13"
        - "21"
      default: 3
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Testable conditions for completion
      placeholder: |
        - [ ] Users can authenticate with Jira OAuth
        - [ ] Tokens are stored encrypted in Supabase
        - [ ] Auto-refresh works with <5s delay
    validations:
      required: true

  - type: dropdown
    id: complexity
    attributes:
      label: Technical Complexity
      options:
        - Low (straightforward implementation)
        - Medium (some unknowns)
        - High (significant R&D required)
      default: 1
    validations:
      required: true

  - type: input
    id: ai_agent_type
    attributes:
      label: AI Agent Assignment
      description: Which type of agent should handle this?
      placeholder: "backend-agent, frontend-agent, data-agent"
    validations:
      required: false

  - type: textarea
    id: technical_notes
    attributes:
      label: Technical Implementation Notes
      description: Architecture decisions, API endpoints, etc.
      placeholder: |
        **APIs Used:** Jira REST API v3
        **Endpoints:** /rest/api/3/project, /rest/api/3/issue
        **Rate Limits:** 150 req/min
    validations:
      required: false
