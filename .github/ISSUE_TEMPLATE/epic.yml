name: 🎯 Epic
description: Portfolio-level initiative with multiple user stories
title: "[EPIC] "
labels: ["epic", "needs-triage"]
body:
  - type: input
    id: epic_id
    attributes:
      label: Epic ID
      description: Unique identifier (e.g., E-001)
      placeholder: E-001
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Epic Description
      description: High-level strategic goal
      placeholder: As a product manager, I want...
    validations:
      required: true

  - type: dropdown
    id: theme
    attributes:
      label: Theme
      description: Which product theme does this belong to?
      options:
        - Foundation & Jira Integration
        - Hierarchy Detection & Project Grouping
        - Rollup Dashboard & Visualization
        - Status & Health Calculation
        - Forecasting & Predictions
        - Data Model & Performance
        - Security & Compliance
        - User Experience & Mobile
        - Testing & Quality
        - Documentation & Deployment
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Critical (MVP blocker)
        - P1 - High (MVP required)
        - P2 - Medium (Post-MVP)
        - P3 - Low (Nice to have)
      default: 1
    validations:
      required: true

  - type: input
    id: story_points
    attributes:
      label: Total Story Points
      description: Aggregate points for all stories
      placeholder: "34"
    validations:
      required: false

  - type: textarea
    id: success_criteria
    attributes:
      label: Success Criteria
      description: How do we know this epic is complete?
      placeholder: |
        - [ ] All child stories completed
        - [ ] Integration tests passing
        - [ ] Performance targets met
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Link to blocking epics/stories (use #issue_number)
      placeholder: "Blocked by: #12, #45"
    validations:
      required: false
