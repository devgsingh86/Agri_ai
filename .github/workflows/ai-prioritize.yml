name: AI Priority Suggestion

on:
  issues:
    types: [opened]

jobs:
  suggest-priority:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Analyze and suggest priority
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();
            
            // Simple heuristic (replace with AI model call)
            let priority = 'P2 - Medium';
            let reasoning = '';
            
            if (title.includes('critical') || title.includes('blocker')) {
              priority = 'P0 - Critical';
              reasoning = 'Contains critical/blocker keywords';
            } else if (body.includes('mvp') || body.includes('must have')) {
              priority = 'P1 - High';
              reasoning = 'Marked as MVP requirement';
            } else if (title.includes('nice to have') || body.includes('post-mvp')) {
              priority = 'P3 - Low';
              reasoning = 'Post-MVP or optional feature';
            }
            
            // Add comment with suggestion
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `🤖 **AI Priority Suggestion:** ${priority}\n\n**Reasoning:** ${reasoning}\n\n_Update the Priority field in the Project board if you agree._`
            });
