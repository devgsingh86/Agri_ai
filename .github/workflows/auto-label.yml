name: Auto-label Issues

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add theme label
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            
            // Extract theme from issue form
            const themeMatch = body.match(/### Theme\s+(.+)/);
            if (themeMatch) {
              const theme = themeMatch[1].trim();
              const label = `theme: ${theme.toLowerCase().replace(/ /g, '-')}`;
              
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [label]
              });
            }
            
            // Auto-label by title prefix
            if (issue.title.includes('[EPIC]')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['epic']
              });
            }
